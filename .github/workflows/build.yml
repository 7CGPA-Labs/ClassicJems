name: Linux Plugins Build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential \
          qt6-base-dev qt6-declarative-dev qt6-base-private-dev qtbase5-dev qtdeclarative5-dev qtbase5-private-dev extra-cmake-modules \
          liblxqt1-dev libkf5plasma-dev libxfce4panel-2.0-dev libsdl2-dev xvfb

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Build Plugins
      run: |
        cd build
        cmake --build . --config Release

    - name: Test Plugins and Player
      run: |
        PLAYER_PATH=$(find build -name "classicjems-player" -type f)
        echo "Found player at: $PLAYER_PATH"
        xvfb-run --auto-servernum "$PLAYER_PATH" --test
        
        find build -name "*.so" -type f | while read -r lib; do
          echo "Verifying symbols for: $lib"
          LDD_OUT=$(ldd -r "$lib" 2>&1)
          echo "$LDD_OUT"
          if echo "$LDD_OUT" | grep -q "undefined symbol"; then
            echo "Error: Undefined symbols found in $lib!"
            exit 1
          fi
        done

    - name: Package Artifacts
      run: |
        mkdir -p dist/bin
        mkdir -p dist/lxqt-plugin
        mkdir -p dist/kde-plasmoid/contents/ui
        mkdir -p dist/xfce-plugin
        
        # Copy Player
        PLAYER_PATH=$(find build -name "classicjems-player" -type f)
        [ -n "$PLAYER_PATH" ] && cp "$PLAYER_PATH" dist/bin/
        
        # Copy LXQt Plugin
        LXQT_LIB=$(find build -name "libplugin-classicjems.so" -type f)
        [ -n "$LXQT_LIB" ] && cp "$LXQT_LIB" dist/lxqt-plugin/
        [ -f "build/classicjems.desktop" ] && cp "build/classicjems.desktop" dist/lxqt-plugin/
        
        # Copy KDE Plasmoid
        KDE_LIB=$(find build -name "libclassicjems_qmlplugin.so" -type f)
        [ -n "$KDE_LIB" ] && cp "$KDE_LIB" dist/kde-plasmoid/
        [ -f "src/kde-plasmoid/metadata.json" ] && cp "src/kde-plasmoid/metadata.json" dist/kde-plasmoid/
        [ -f "src/kde-plasmoid/contents/ui/main.qml" ] && cp "src/kde-plasmoid/contents/ui/main.qml" dist/kde-plasmoid/contents/ui/
        
        # Copy XFCE Plugin
        XFCE_LIB=$(find build -name "libclassicjems-xfce.so" -type f)
        [ -n "$XFCE_LIB" ] && cp "$XFCE_LIB" dist/xfce-plugin/
        [ -f "build/classicjems-xfce.desktop" ] && cp "build/classicjems-xfce.desktop" dist/xfce-plugin/
        
        echo "Packaged distribution tree:"
        ls -R dist

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: classicjems-linux-plugins
        path: dist/
