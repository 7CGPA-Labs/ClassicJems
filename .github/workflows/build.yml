name: Linux Plugins Build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential \
          qt6-base-dev qt6-declarative-dev qt6-base-private-dev qtbase5-dev qtdeclarative5-dev qtbase5-private-dev extra-cmake-modules \
          liblxqt1-dev libkf5plasma-dev libxfce4panel-2.0-dev libsdl2-dev xvfb

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Build Plugins
      run: |
        cd build
        cmake --build . --config Release

    - name: Test Plugins and Player
      run: |
        PLAYER_PATH=$(find build -name "classicjems-player" -type f)
        echo "Found player at: $PLAYER_PATH"
        xvfb-run --auto-servernum "$PLAYER_PATH" --test
        
        find build -name "*.so" -type f | while read -r lib; do
          echo "Verifying symbols for: $lib"
          LDD_OUT=$(ldd -r "$lib" 2>&1)
          echo "$LDD_OUT"
          if echo "$LDD_OUT" | grep -q "undefined symbol"; then
            echo "Error: Undefined symbols found in $lib!"
            exit 1
          fi
        done
